<svg
  width="24"
  height="24"
  viewBox="0 0 24 24"
  fill="none"
  xmlns="http://www.w3.org/2000/svg"
  aria-label="完全模式"
>
  <defs>
    <linearGradient id="fullSunGradient" x1="2" y1="3" x2="16" y2="17">
      <stop offset="0%" stop-color="#FFD86B" />
      <stop offset="100%" stop-color="#FF9F1C" />
    </linearGradient>

    <linearGradient id="fullMoonGradient" x1="10" y1="7" x2="23" y2="21">
      <stop offset="0%" stop-color="#E7EEFF" />
      <stop offset="100%" stop-color="#7C8DB5" />
    </linearGradient>

    <!-- 更大的月牙裁切 -->
    <mask id="fullMoonMask" maskUnits="userSpaceOnUse">
      <rect width="24" height="24" fill="white" />
      <circle cx="18.75" cy="10.95" r="5.75" fill="black" />
    </mask>

    <clipPath id="fullMoonClip">
      <circle cx="16.15" cy="14.1" r="6.25" />
    </clipPath>
  </defs>

  <!-- sun rays -->
  <g stroke="#FFB703" stroke-width="1.35" stroke-linecap="round">
    <path d="M8.35 2.35V4.05" />
    <path d="M8.35 14.9V16.6" />
    <path d="M2.1 9.45H3.8" />
    <path d="M12.9 9.45H14.6" />
    <path d="M4 5.05L5.2 6.25" />
    <path d="M11.5 12.55L12.7 13.75" />
    <path d="M12.7 5.05L11.5 6.25" />
    <path d="M5.2 12.55L4 13.75" />
  </g>

  <!-- bigger sun -->
  <circle cx="8.35" cy="9.45" r="5.15" fill="url(#fullSunGradient)" />

  <!-- sun highlight -->
  <circle cx="6.75" cy="7.65" r="1" fill="#FFF4C2" opacity="0.75" />

  <!-- bigger moon crescent -->
  <circle
    cx="16.15"
    cy="14.1"
    r="6.25"
    fill="url(#fullMoonGradient)"
    mask="url(#fullMoonMask)"
  />

  <!-- moon outer outline -->
  <circle
    cx="16.15"
    cy="14.1"
    r="6.25"
    fill="none"
    stroke="#6E7FA8"
    stroke-width="0.75"
    opacity="0.35"
    mask="url(#fullMoonMask)"
  />

  <!-- moon inner curve -->
  <circle
    cx="18.75"
    cy="10.95"
    r="5.75"
    fill="none"
    stroke="#6E7FA8"
    stroke-width="0.75"
    opacity="0.28"
    clip-path="url(#fullMoonClip)"
  />

  <!-- tiny star -->
  <path
    d="M16.35 2.35L16.75 3.5L17.9 3.9L16.75 4.3L16.35 5.45L15.95 4.3L14.8 3.9L15.95 3.5L16.35 2.35Z"
    fill="#AFC4FF"
  />
</svg>