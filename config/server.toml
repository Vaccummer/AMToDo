[server]
host = ""
port = 8000
name = "Vaccummer"

[database]
url = "sqlite:///db/amtodo.sqlite3"

[auth]
admin_token = "123456"

[log]
file = "log/server.log"

[encryption]
public_key_path = "config/keys/server_public.pem"
private_key_path = "config/keys/server_private.pem"
request_timestamp_tolerance_seconds = 300

[storage]
attachment_root = "db"

[rate_limit]
# Max requests per IP in the time window for public (unauthenticated) endpoints
requests = 30
window_seconds = 60

[notification]
# Background check interval for triggered notifications (seconds)
watcher_interval = 10

# Heartbeat interval for WebSocket connections (seconds)
heartbeat_interval = 30

# Authentication handshake timeout for new WebSocket connections (seconds)
auth_timeout = 5

# Maximum lifetime of a session key (seconds, safety net)
session_key_ttl = 3600

[health]
# TTL (seconds) for cached public IP addresses (0 = no cache, fetch every time)
ip_cache_ttl = 300
